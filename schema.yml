components:
  schemas:
    AccountRole:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
          description: Max 1200 words
          maxLength: 1200
        is_active:
          type: boolean
      required:
      - id
      - name
    ActionEnum:
      enum:
      - INCREASE
      - DECREASE
      type: string
      description: |-
        * `INCREASE` - INCREASE
        * `DECREASE` - DECREASE
    AdditionalOrder:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        accessories:
          type: array
          items:
            $ref: '#/components/schemas/AdditionalOrderAccessories'
        assigned_to_name:
          type: string
          readOnly: true
        business_details:
          allOf:
          - $ref: '#/components/schemas/BussinessDetailsSerializerForAdditionalOrder'
          readOnly: true
        order_terminal_details:
          allOf:
          - $ref: '#/components/schemas/OrderTerminal'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        is_deleted:
          type: boolean
        deleted_at:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
        number:
          type: string
          nullable: true
          maxLength: 255
        order_date:
          type: string
          format: date
          nullable: true
        address_type:
          $ref: '#/components/schemas/AddressTypeEnum'
        street_line1:
          type: string
          nullable: true
          description: First Line/Street
          maxLength: 255
        street_line2:
          type: string
          nullable: true
          description: Second Line/Town
          maxLength: 255
        contact_name:
          type: string
          nullable: true
          description: Delivery Contact Person Name
          maxLength: 255
        postcode:
          type: string
          nullable: true
          description: Postal Code
          maxLength: 20
        phone_number:
          type: string
          nullable: true
          maxLength: 20
        status:
          $ref: '#/components/schemas/Status291Enum'
        auto_batch:
          type: boolean
        auto_batch_time:
          type: string
          format: time
          nullable: true
        till_roll_text1:
          type: string
          nullable: true
          maxLength: 100
        till_roll_text2:
          type: string
          nullable: true
          maxLength: 100
        till_roll_text3:
          type: string
          nullable: true
          maxLength: 100
        delivery_channel:
          type: string
          nullable: true
          maxLength: 200
        pod_ref:
          type: string
          nullable: true
          maxLength: 255
        notes:
          type: string
          nullable: true
        priority:
          $ref: '#/components/schemas/PriorityEnum'
        deleted_by:
          type: integer
          nullable: true
        order:
          type: integer
        order_terminal:
          type: integer
        terminal_model:
          type: integer
          nullable: true
        terminal:
          type: integer
          nullable: true
        business:
          type: integer
          nullable: true
        assigned_to:
          type: integer
          nullable: true
      required:
      - assigned_to_name
      - business_details
      - created_at
      - id
      - order
      - order_terminal
      - order_terminal_details
      - status
      - updated_at
    AdditionalOrderAccessories:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product_title:
          type: string
          readOnly: true
        product_model_name:
          type: string
          readOnly: true
        product_serial_number:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        number:
          type: string
          readOnly: true
          nullable: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        product_model:
          type: integer
          nullable: true
        product:
          type: integer
          nullable: true
      required:
      - created_at
      - id
      - is_active
      - number
      - product_model_name
      - product_serial_number
      - product_title
      - updated_at
    AddressTypeEnum:
      enum:
      - TRADING
      - HOME
      - THIRD_PARTY
      - BDM_COLLECTION
      type: string
      description: |-
        * `TRADING` - Trading
        * `HOME` - Home
        * `THIRD_PARTY` - Third Party
        * `BDM_COLLECTION` - BDM Collection
    AllSectionWisePermission:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/PermissionMinimized'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        is_deleted:
          type: boolean
        deleted_at:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
        slug:
          type: string
          nullable: true
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          maxLength: 100
        deleted_by:
          type: integer
          nullable: true
      required:
      - created_at
      - id
      - name
      - permissions
      - updated_at
    AssignPermissionToRole:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/AccountRole'
          writeOnly: true
        name:
          type: string
          readOnly: true
        description:
          type: string
          nullable: true
          description: Max 1200 words
          readOnly: true
        permissions:
