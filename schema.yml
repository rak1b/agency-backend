      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    delete:
      operationId: auth_web_user_destroy
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - auth
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/inventory/web/bulk-import-livebase-product-ps-format/:
    post:
      operationId: inventory_web_bulk_import_livebase_product_ps_format_create
      description: "Upload an Excel or CSV file to bulk import products. The file\
        \ should contain product data with required and optional columns.\n\n    \
        \    Demo Format : https://docs.google.com/spreadsheets/d/1ADFImgjBhSsUqpL0_7ToQ2K9wuNfZK6G2W__ZZjTRo4/edit?usp=sharing\
        \         "
      summary: Bulk import products from Excel/CSV file
      tags:
      - inventory
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Excel or CSV file containing product data
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '201':
          description: Products imported successfully
        '400':
          description: Invalid file or data
  /api/v1/inventory/web/bulk-import-product/:
    post:
      operationId: inventory_web_bulk_import_product_create
