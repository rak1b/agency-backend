openapi: 3.0.3
info:
  title: Paymentsave Inventory
  version: 1.0.0
  description: API collection for Paymentsave Inventory
  contact:
    name: Radwan Hossain
    email: mdradwanhossain21@gmail.com
paths:
  /api/v1/auth/web/all-permissions-section-wise/:
    get:
      operationId: auth_web_all_permissions_section_wise_list
      tags:
      - auth
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AllSectionWisePermission'
          description: ''
  /api/v1/auth/web/dashboard-order-summary/:
    get:
      operationId: auth_web_dashboard_order_summary_retrieve
      description: Get order summary for a given date range
      parameters:
      - in: query
        name: end_date
        schema:
          type: string
          format: date
        description: End date (optional)
      - in: query
        name: start_date
        schema:
          type: string
          format: date
        description: Start date (optional)
      tags:
      - Dashboard
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/web/dashboard-order-trend-summary/:
    get:
      operationId: auth_web_dashboard_order_trend_summary_retrieve
      description: Get product models with their order counts for a given date range
      parameters:
      - in: query
        name: end_date
        schema:
          type: string
          format: date
        description: 'End date (optional) Format: YYYY-MM-DD'
      - in: query
        name: model_type
        schema:
          type: string
        description: Filter by model type (TERMINAL/ACCESSORIES)
      - in: query
        name: search
        schema:
          type: string
        description: Search product model name (optional)
      - in: query
        name: start_date
        schema:
          type: string
          format: date
        description: 'Start date (optional) Format: YYYY-MM-DD'
      tags:
      - Dashboard
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/web/dashboard-product-summary/:
    get:
      operationId: auth_web_dashboard_product_summary_retrieve
      tags:
      - auth
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/web/dashboard-terminal-assigned-summary/:
    get:
      operationId: auth_web_dashboard_terminal_assigned_summary_retrieve
      description: Get terminal assigned summary for a given date range
      parameters:
      - in: query
        name: end_date
        schema:
          type: string
          format: date
        description: 'End date (optional) Format: YYYY-MM-DD'
      - in: query
        name: search
        schema:
          type: string
        description: Search user name (optional)
      - in: query
        name: start_date
        schema:
          type: string
          format: date
        description: 'Start date (optional) Format: YYYY-MM-DD'
      tags:
      - Dashboard
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/web/forget-password/:
    post:
      operationId: auth_web_forget_password_create
      tags:
      - Account-Util-API
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgetPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgetPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgetPasswordRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForgetPasswordRequest'
          description: ''
  /api/v1/auth/web/forget-password-confirm/:
    post:
      operationId: auth_web_forget_password_confirm_create
      tags:
      - Account-Util-API
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgetPasswordConfirm'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgetPasswordConfirm'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgetPasswordConfirm'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForgetPasswordConfirm'
          description: ''
  /api/v1/auth/web/history/:
    get:
      operationId: auth_web_history_list
      parameters:
      - in: query
        name: end_date
        schema:
          type: string
          format: date
        description: Filter history records up to this date
      - in: query
        name: id
        schema:
          type: integer
        description: ID of the object to get history for
        examples:
          ExampleID:
            value: 123
            summary: Example ID
            description: Example ID value
      - in: query
        name: model
        schema:
          type: string
        description: Model name in format "app_name.ModelName"
        examples:
          Role:
            value: authentication.Role
            summary: role
            description: Example for role model
          Section:
            value: authentication.Section
            summary: section
            description: Example for section model
          Permission:
            value: authentication.Permission
            summary: permission
            description: Example for permission model
          RolePermission:
            value: authentication.RolePermission
            summary: role permission
            description: Example for role permission model
          Merchant:
            value: authentication.Merchant
            summary: merchant
            description: Example for merchant model
          OauthToken:
            value: authentication.OauthToken
            summary: oauth token
            description: Example for oauth token model
          CrmOauthToken:
            value: authentication.CrmOauthToken
            summary: crm oauth token
            description: Example for crm oauth token model
          Confirmation:
            value: authentication.Confirmation
            summary: confirmation
            description: Example for confirmation model
          BlockedIp:
            value: security.BlockedIP
            summary: blocked ip
            description: Example for blocked ip model
          WhitelistedIp:
            value: security.WhitelistedIP
            summary: whitelisted ip
            description: Example for whitelisted ip model
          RepairDamageReason:
            value: inventory.RepairDamageReason
            summary: repair damage reason
            description: Example for repair damage reason model
          Supplier:
            value: inventory.Supplier
            summary: supplier
            description: Example for supplier model
          ProductCategory:
            value: inventory.ProductCategory
            summary: product category
            description: Example for product category model
          ProductModel:
            value: inventory.ProductModel
            summary: product model
            description: Example for product model model
          Product:
            value: inventory.Product
            summary: product
            description: Example for product model
          BusinessHistoryAccessories:
            value: inventory.BusinessHistoryAccessories
            summary: business history accessories
            description: Example for business history accessories model
          BusinessHistorySoftwareAddon:
            value: inventory.BusinessHistorySoftwareAddon
            summary: business history software addon
            description: Example for business history software addon model
          BussinessHistory:
            value: inventory.BussinessHistory
            summary: bussiness history
            description: Example for bussiness history model
          ProductStockLog:
            value: inventory.ProductStockLog
            summary: product stock log
            description: Example for product stock log model
          LowStockNotification:
            value: inventory.LowStockNotification
            summary: low stock notification
            description: Example for low stock notification model
          ReturnStockToInventory:
            value: inventory.ReturnStockToInventory
            summary: return stock to inventory
            description: Example for return stock to inventory model
          Businesses:
            value: order.Businesses
            summary: businesses
            description: Example for businesses model
          SoftwareAddon:
            value: order.SoftwareAddon
            summary: software addon
            description: Example for software addon model
          OrderSoftwareAddon:
            value: order.OrderSoftwareAddon
            summary: order software addon
            description: Example for order software addon model
          OrderAccessories:
            value: order.OrderAccessories
            summary: order accessories
            description: Example for order accessories model
          OrderTerminal:
            value: order.OrderTerminal
            summary: order terminal
            description: Example for order terminal model
          Order:
            value: order.Order
            summary: order
            description: Example for order model
          AdditionalOrderAccessories:
            value: order.AdditionalOrderAccessories
            summary: additional order accessories
            description: Example for additional order accessories model
          AdditionalOrder:
            value: order.AdditionalOrder
            summary: additional order
            description: Example for additional order model
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: start_date
        schema:
          type: string
          format: date
        description: Filter history records starting from this date
      tags:
      - auth
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedHistoryList'
          description: ''
        '400':
          content:
            application/json:
              schema:
                detail: Model name and object ID are required.
          description: ''
        '404':
          content:
            application/json:
              schema:
                detail: Object not found.
          description: ''
  /api/v1/auth/web/reset-password/:
    post:
      operationId: auth_web_reset_password_create
      tags:
      - Account-Util-API
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetPasswordRequest'
          description: ''
  /api/v1/auth/web/role/:
    get:
      operationId: auth_web_role_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: role
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - auth
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRolePermissionListList'
          description: ''
    post:
      operationId: auth_web_role_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignPermissionToRole'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssignPermissionToRole'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssignPermissionToRole'
        required: true
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignPermissionToRole'
          description: ''
  /api/v1/auth/web/role-list/:
    get:
      operationId: auth_web_role_list_list
      description: ViewSet for managing roles and their permissions.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - auth
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAccountRoleList'
          description: ''
  /api/v1/auth/web/role/{id}/:
    get:
      operationId: auth_web_role_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this role permission.
        required: true
      tags:
      - auth
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignPermissionToRole'
          description: ''
    put:
      operationId: auth_web_role_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this role permission.
        required: true
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignPermissionToRole'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssignPermissionToRole'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssignPermissionToRole'
        required: true
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignPermissionToRole'
          description: ''
    patch:
      operationId: auth_web_role_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this role permission.
        required: true
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAssignPermissionToRole'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAssignPermissionToRole'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAssignPermissionToRole'
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignPermissionToRole'
          description: ''
    delete:
      operationId: auth_web_role_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this role permission.
        required: true
      tags:
      - auth
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/web/token/:
    post:
      operationId: auth_web_token_create
      tags:
      - Authentication & Authorization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              Request:
                value:
                  email: user@example.com
                  password: '123456'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                Success:
                  value:
                    id: 1
                    profile_image: https://cdn.example.com/u.png
                    name: User
                    email: user@example.com
                    phone: +8801...
                    access_token: <jwt>
                    refresh_token: <jwt>
                    user_slug: user-slug
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                InvalidCredentials:
                  value:
                    detail: Invalid Email or Password
                  summary: Invalid credentials
          description: ''
  /api/v1/auth/web/token/refresh/:
    post:
      operationId: auth_web_token_refresh_create
      tags:
      - Authentication & Authorization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenReqeust'
            examples:
              Request:
                value:
                  refresh_token: <jwt>
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RefreshTokenReqeust'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RefreshTokenReqeust'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                Success:
                  value:
                    access_token: <jwt>
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                InvalidPayload:
                  value:
                    detail: Invalid payload data
                  summary: Invalid payload
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                InvalidToken:
                  value:
                    error: Invalid or expired refresh token
                  summary: Invalid token
          description: ''
  /api/v1/auth/web/upload-image/:
    post:
      operationId: auth_web_upload_image_create
      description: Upload an image file to Cloudflare R2 storage. The image will be
        compressed and converted to WebP format. You can specify custom width, height,
        and quality parameters.
      tags:
      - auth
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 'Image file to upload (supported formats: JPG, PNG,
                    WEBP)'
                width:
                  type: integer
                  description: 'Width to resize the image to (optional, default: 700)'
                height:
                  type: integer
                  description: 'Height to resize the image to (optional, default:
                    700)'
                quality:
                  type: integer
                  description: 'Image quality (1-100, optional, default: 100)'
                previous_file_url:
                  type: string
                  description: Previous file URL to delete (optional)
      security:
      - JWT Authentication: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                SuccessResponse:
                  value:
                    message: File uploaded successfully
                    file_url: https://dwa.rakib.cloud/example_20240321123456_abc12.webp
                  summary: Success Response
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ErrorResponse:
                  value:
                    error: No file provided
                  summary: Error Response
          description: ''
        '500':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/auth/web/user/:
    get:
      operationId: auth_web_user_list
      parameters:
      - in: query
        name: gender
        schema:
          type: integer
          enum:
          - 0
          - 1
          - 2
        description: |-
          * `1` - Female
          * `0` - Male
          * `2` - Other
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: role
        schema:
          type: array
          items:
            type: integer
        explode: true
        style: form
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: user_id
        schema:
          type: string
      tags:
      - auth
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserList'
          description: ''
    post:
      operationId: auth_web_user_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/User'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/User'
        required: true
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/auth/web/user-permissions-section-wise/:
    get:
      operationId: auth_web_user_permissions_section_wise_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - auth
      security:
      - JWT Authentication: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSectionWiseUserPermissionList'
          description: ''
