networks:
  ps_inventory_net:

services:
  web:
    build: .
    restart: always
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate &&
             gunicorn Config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./static:/app/static
      - ./media:/app/media
      - ./logs:/app/logs
    ports:
      - "${WEB_PORT:-18000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ps_inventory_net

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ps_inventory_net

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - ps_inventory_net

volumes:
  postgres_data:
  static:
  media:
  logs:
